<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141a3a"/>
      <stop offset="1" stop-color="#0c1024"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3566"/>
      <stop offset="1" stop-color="#1d264c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="420" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="418" rx="18" fill="none" stroke="#46649b" stroke-opacity="0.5"/>

  <!-- 3x3 grid -->
  <g stroke="#3a4f8c" stroke-opacity="0.35" stroke-width="1">
    <line x1="315" y1="30" x2="315" y2="390"/>
    <line x1="600" y1="30" x2="600" y2="390"/>
    <line x1="30" y1="150" x2="870" y2="150"/>
    <line x1="30" y1="270" x2="870" y2="270"/>
  </g>

  <!-- mock windows scattered across cells -->
  <!-- top-left: browser -->
  <g transform="translate(60,55)">
    <rect width="190" height="72" rx="7" fill="url(#win)" stroke="#5a73b8" stroke-opacity="0.6"/>
    <rect width="190" height="18" rx="7" fill="#37467f"/>
    <circle cx="13" cy="9" r="3" fill="#ff6b6b"/><circle cx="25" cy="9" r="3" fill="#ffd166"/><circle cx="37" cy="9" r="3" fill="#7bd88f"/>
    <rect x="12" y="30" width="120" height="7" rx="3" fill="#6f86c8"/>
    <rect x="12" y="44" width="160" height="7" rx="3" fill="#46568f"/>
    <rect x="12" y="56" width="90" height="7" rx="3" fill="#46568f"/>
  </g>
  <!-- top-right: editor -->
  <g transform="translate(650,60)">
    <rect width="180" height="78" rx="7" fill="url(#win)" stroke="#5a73b8" stroke-opacity="0.6"/>
    <rect width="180" height="18" rx="7" fill="#37467f"/>
    <rect x="12" y="30" width="60" height="7" rx="3" fill="#7bd88f"/>
    <rect x="80" y="30" width="80" height="7" rx="3" fill="#46568f"/>
    <rect x="12" y="44" width="140" height="7" rx="3" fill="#6f86c8"/>
    <rect x="12" y="58" width="100" height="7" rx="3" fill="#46568f"/>
  </g>
  <!-- bottom-left: files -->
  <g transform="translate(70,300)">
    <rect width="170" height="66" rx="7" fill="url(#win)" stroke="#5a73b8" stroke-opacity="0.6"/>
    <rect width="170" height="18" rx="7" fill="#37467f"/>
    <rect x="12" y="30" width="40" height="26" rx="4" fill="#46568f"/>
    <rect x="62" y="30" width="40" height="26" rx="4" fill="#46568f"/>
    <rect x="112" y="30" width="40" height="26" rx="4" fill="#46568f"/>
  </g>
  <!-- bottom-right: terminal -->
  <g transform="translate(645,300)">
    <rect width="185" height="68" rx="7" fill="#10162e" stroke="#5a73b8" stroke-opacity="0.6"/>
    <rect width="185" height="18" rx="7" fill="#2a3566"/>
    <rect x="12" y="30" width="70" height="6" rx="3" fill="#7bd88f"/>
    <rect x="12" y="42" width="120" height="6" rx="3" fill="#6f86c8"/>
    <rect x="12" y="54" width="50" height="6" rx="3" fill="#46568f"/>
  </g>

  <!-- center cell: highlighted "current view" -->
  <rect x="324" y="159" width="267" height="102" rx="10" fill="#1b48a0" fill-opacity="0.18" stroke="#8cbeff" stroke-width="2.5" filter="url(#glow)"/>
  <g transform="translate(360,180)">
    <rect width="195" height="62" rx="7" fill="url(#win)" stroke="#9cc3ff" stroke-opacity="0.8"/>
    <rect width="195" height="18" rx="7" fill="#3e5097"/>
    <rect x="12" y="30" width="120" height="7" rx="3" fill="#9cc3ff"/>
    <rect x="12" y="44" width="160" height="7" rx="3" fill="#5a73b8"/>
  </g>
  <text x="457" y="150" fill="#9cc3ff" font-size="13" font-weight="600" text-anchor="middle">current view</text>

  <!-- pan arrows -->
  <g fill="#6f86c8" fill-opacity="0.8">
    <path d="M305 210 l-16 -9 v18 z"/>
    <path d="M610 210 l16 -9 v18 z"/>
    <path d="M457 145 l-9 -16 h18 z"/>
    <path d="M457 275 l-9 16 h18 z"/>
  </g>
</svg>
